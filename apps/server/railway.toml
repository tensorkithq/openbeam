[build]
builder = "nixpacks"
# Railway root directory should be set to repo root (not apps/server)
# so nixpacks resolves the full workspace correctly
buildCommand = "cd apps/server && cargo build --release"
watchPatterns = ["apps/server/**"]

[deploy]
startCommand = "cd apps/server && ./target/release/openbeam-server"
healthcheckPath = "/api/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
