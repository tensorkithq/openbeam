[build]
builder = "nixpacks"
# rootDirectory is set to apps/web in Railway — navigate up to workspace root for pnpm install
buildCommand = "cd ../.. && npm i -g pnpm && pnpm install --frozen-lockfile && pnpm --filter @openbeam/web build"

[deploy]
startCommand = "npx serve build -s -l tcp://0.0.0.0:$PORT"
